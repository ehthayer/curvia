<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b1916"/>
      <stop offset="1" stop-color="#0e0e10"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.55">
      <stop offset="0" stop-color="#c9a36a" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#c9a36a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="curve" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e8d5b5"/>
      <stop offset="1" stop-color="#c9a36a"/>
    </linearGradient>
  </defs>

  <!-- rounded tile -->
  <rect x="40" y="40" width="944" height="944" rx="212" fill="url(#bg)"/>
  <rect x="40" y="40" width="944" height="944" rx="212" fill="url(#glow)"/>
  <rect x="40.5" y="40.5" width="943" height="943" rx="211.5" fill="none" stroke="#2a2a30" stroke-width="3"/>

  <!-- faint pressure gridlines -->
  <g stroke="#2a2a30" stroke-width="3">
    <line x1="210" y1="360" x2="814" y2="360"/>
    <line x1="210" y1="510" x2="814" y2="510"/>
    <line x1="210" y1="660" x2="814" y2="660"/>
  </g>

  <!-- crema fill under the curve -->
  <path d="M210 690 L300 520 L392 300 L700 300 L814 470 L814 740 L210 740 Z"
        fill="#c9a36a" fill-opacity="0.12"/>

  <!-- the pressure curve: pre-infusion -> infusion plateau -> ramp-down -->
  <path d="M210 690 L300 520 L392 300 L700 300 L814 470"
        fill="none" stroke="url(#curve)" stroke-width="40"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
